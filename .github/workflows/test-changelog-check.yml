name: "Test changelog-check"

on:
  push:
    paths:
      - "changelog-check/*"

jobs:
  test:
    runs-on: "ubuntu-latest"

    steps:
      - uses: "actions/checkout@v6"

      - name: "Changelog check"
        uses: "./changelog-check"
        with:
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
